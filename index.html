<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Frontend Mentor | Time tracking dashboard</title>
  <link rel="stylesheet" type="text/css" href="./style.css">

</head>
<body>
  <main class="container">
    <div class="user child">
      <div class="profile-cont">
        <img src="./images/image-jeremy.png" alt="dp">
        <small style="color: #b7b1ff;">Report for</small>
        <h1 style="font-size: 36px; line-height: 40px; margin: 10px 0;">Jerermy <br> Robson</h1>
      </div>
      <ul>
        <li><button class="options">Daily</button></li>
        <li><button style="color: #dee1ec;" class="options">Weekly</button></li>
        <li><button class="options">Monthly</button></li>
      </ul>

    </div>

    <div class="child panel" >
      <img src="./images/icon-work.svg" alt="work">
      <div class="text-cont">
        <span style="font-weight: 400; display: inline; float: left;">Work</span>
        <img src="./images/icon-ellipsis.svg" alt="elipsis" style="display: inline; float: right; margin: 8px 0 10px;">
        <h1 class="current">32hrs</h1>
        <span class="prev">Last Week - 36hrs</span>
      </div>
    </div>
    <div class="child panel" >
      <img src="./images/icon-play.svg" alt="work">
      <div class="text-cont">
        <span style="font-weight: 400; display: inline; float: left;">Play</span>
        <img src="./images/icon-ellipsis.svg" alt="elipsis" style="display: inline; float: right; margin: 8px 0 10px;">
        <h1 class="current">32hrs</h1>
        <span class="prev">Last Week - 36hrs</span>
      </div>
    </div>
    <div class="child panel" >
      <img src="./images/icon-study.svg" alt="work">
      <div class="text-cont">
        <span style="font-weight: 400; display: inline; float: left;">Study</span>
        <img src="./images/icon-ellipsis.svg" alt="elipsis" style="display: inline; float: right; margin: 8px 0 10px;">
        <h1 class="current">32hrs</h1>
        <span class="prev">Last Week - 36hrs</span>
      </div>
    </div>
    <div class="child panel" >
      <img src="./images/icon-exercise.svg" alt="work">
      <div class="text-cont">
        <span style="font-weight: 400; display: inline; float: left;">Exercise</span>
        <img src="./images/icon-ellipsis.svg" alt="elipsis" style="display: inline; float: right; margin: 8px 0 10px;">
        <h1 class="current">32hrs</h1>
        <span class="prev">Last Week - 36hrs</span>
      </div>
    </div>
    <div class="child panel" >
      <img src="./images/icon-social.svg" alt="work">
      <div class="text-cont">
        <span style="font-weight: 400; display: inline; float: left;">Social</span>
        <img src="./images/icon-ellipsis.svg" alt="elipsis" style="display: inline; float: right; margin: 8px 0 10px;">
        <h1 class="current">32hrs</h1>
        <span class="prev">Last Week - 36hrs</span>
      </div>
    </div>
    <div class="child panel" >
      <img src="./images/icon-self-care.svg" alt="work">
      <div class="text-cont">
        <span style="font-weight: 400; display: inline; float: left;">Self Care</span>
        <img src="./images/icon-ellipsis.svg" alt="elipsis" style="display: inline; float: right; margin: 8px 0 10px;">
        <h1 class="current">32hrs</h1>
        <span class="prev">Last Week - 36hrs</span>
      </div>
    </div>


 
  </main>

  <script src="./index.js"></script>
  <script src="./data.json"></script>
</body>
</html>
